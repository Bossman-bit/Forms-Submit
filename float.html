<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://kit.fontawesome.com/d50fafe38e.js" crossorigin="anonymous"></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #dce6ef;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 800px;
        }

        .container{
            width: 1200px;
            height: 650px;
             background: linear-gradient(
                100deg,
                #4f8ff7,
                #6f73ff,
                #d7d7ff,
                #d8edf5
            );
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .open{
            position: absolute;
            top: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            padding: 30px 40px ;
            color: white;
            font-size: 13px;
        }

        .home{
            display: flex;
            align-items: center;
        }

        .home i{
            margin-right: 8px;
        }

        .logo{
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .logo i{
        margin-right: 10px;
        }

        form{
            width: 420px;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
        }

        form h2{
            text-align: center;
            margin-bottom: 10px;
        }

        form p{
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        form label{
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
 
        form input[type="email"], form input[type="password"]{
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #5f6dfc;
            color: #fff;
            cursor: pointer;
        }

        .buttons{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
        }

        form span{
            color: gray;
        }

        form a{
            text-decoration: none;
            color: #5f6dfc;
            font-weight: bold;
        }
    </style>
    <title>Form Submit</title>
</head>
<body>
    <div class="container">

        <section class="open">
            <div class="home">
                <i class="fa-solid fa-angle-left"></i>
                <span>Home page</span>
            </div>
            
            <div class="logo">
                <i class="fa-brands fa-codepen"></i>
                <span>PEPPO</span>
            </div>
        </section>

        <form>
            <h2>Welcome Back</h2>
            <p>We misses you! Please enter your details.</p>

            <label for="email">Email</label>
            <input type="email" id="Email" placeholder="example@gmail.com">
            <br>

            <label for="password">Password</label>
            <input type="password" placeholder="Enter password">
            <i class="fa-regular fa-eye-slash"></i>

            <input type="checkbox" placeholder="Remember Me">
            <label for="me">Remember me</label>
            <a href="#">Forgot password</a>
            <br>

            <button class="button">Sign In</button>
            <br>
            <button class="buttons"><i class="fa-brands fa-google"></i>Sign in with google</button>
            <br>
            <span>Don't have an account?</span>
            <a href="#">Sign up</a>
        </form>
    </div>
</body>
</html>
